<script>
window.addEventListener('error', function(e) {
  var loader = document.getElementById('loader');
  if (loader && loader.style.display !== 'none' && loader.parentNode) {
    loader.innerHTML = '<div style="padding:20px;text-align:left;font-family:monospace;font-size:11px;color:#fca5a5;line-height:1.6;max-width:500px;letter-spacing:normal;text-transform:none;">'+
      '<div style="color:#f97316;font-weight:bold;margin-bottom:10px;font-size:13px;">ERROR</div>'+
      '<div><b>Message:</b> '+(e.message||'unknown')+'</div>'+
      '<div><b>Line:</b> '+(e.lineno||'?')+':'+(e.colno||'?')+'</div>'+
      (e.error&&e.error.stack ? '<pre style="white-space:pre-wrap;color:#a1a1aa;font-size:10px;margin-top:10px;">'+e.error.stack+'</pre>' : '')+
      '</div>';
  }
});
</script>
